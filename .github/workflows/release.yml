name: Build and Release

# Only triggers on push to main. PR-time validation lives in pr.yml,
# which delegates to the shared label/bump checks in sarxina-tools.
#
# This workflow reads the version from package.json. If a tag for that
# version already exists, it skips. Otherwise it builds the Electron
# app for macOS + Windows, uploads artifacts, then creates a GitHub
# Release with those binaries attached and tags the merge commit.
#
# Tags aren't under branch protection so this workflow doesn't need
# any push-to-main bypass.

on:
  push:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read package.json + check tag
        id: check
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists; skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Will build and release v$VERSION."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: gate
    if: needs.gate.outputs.should_release == 'true'
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Electron app
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            release/**/*.dmg
            release/**/*.exe
            release/**/*.AppImage
            !release/**/win-unpacked/**
            !release/**/elevate.exe
            !release/**/UnInstall*.exe

  release:
    needs: [gate, build]
    if: needs.gate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos-latest
          path: artifacts

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows-latest
          path: artifacts

      - name: Create GitHub Release (also creates the tag)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.gate.outputs.version }}
          name: Sarxina Plugin Manager v${{ needs.gate.outputs.version }}
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
