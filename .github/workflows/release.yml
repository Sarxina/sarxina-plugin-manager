name: Build and Release

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  push:
    branches: [main]

jobs:
  # Validate branch naming on PRs
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming convention
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ ! "$BRANCH" =~ ^(major|minor|patch)/ ]]; then
            echo "::error::Branch name must start with major/, minor/, or patch/ (got: $BRANCH)"
            exit 1
          fi
          echo "Branch '$BRANCH' follows naming convention"

  # Build and release on merge to main
  build:
    if: github.event_name == 'push'
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Determine version bump from merge commit
        id: version
        shell: bash
        run: |
          # Get the merge commit message which contains the branch name
          COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "Commit message: $COMMIT_MSG"

          # Extract branch name from merge commit (format: "Merge pull request #N from User/branch")
          BRANCH=$(echo "$COMMIT_MSG" | grep -oP '(?<=from [^/]+/)\S+' || echo "")

          # Also check for squash merges (format: "branch name (#N)")
          if [ -z "$BRANCH" ]; then
            BRANCH=$(echo "$COMMIT_MSG" | grep -oP '^\S+(?= \(#)' || echo "")
          fi

          echo "Detected branch: $BRANCH"

          if [[ "$BRANCH" == major/* ]]; then
            echo "bump=major" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == minor/* ]]; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == patch/* ]]; then
            echo "bump=patch" >> $GITHUB_OUTPUT
          else
            echo "bump=patch" >> $GITHUB_OUTPUT
            echo "Could not detect version type from branch, defaulting to patch"
          fi

      - name: Bump version (only on first matrix runner)
        if: matrix.os == 'macos-latest' && !contains(github.event.head_commit.message, '[skip ci]')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version ${{ steps.version.outputs.bump }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          git add package.json package-lock.json
          git commit -m "chore: release v${NEW_VERSION} [skip ci]"
          git tag "v${NEW_VERSION}"
          git pull --rebase origin main || true
          git push
          git push --tags

      - name: Get current version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm install

      - name: Build Electron app
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            release/**/*.dmg
            release/**/*.exe
            release/**/*.AppImage
            !release/**/win-unpacked/**
            !release/**/elevate.exe
            !release/**/UnInstall*.exe

  release:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Get version
        id: pkg
        run: |
          git pull
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Download Mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos-latest
          path: artifacts

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows-latest
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: Sarxina Plugin Manager v${{ steps.pkg.outputs.version }}
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
